name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Web app -> GitHub Pages. Built with the Node pinned by the flake so the
  # hosted build is reproducible too.
  # ---------------------------------------------------------------------------
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Determinate Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-

      - name: Create .env file
        working-directory: ./client
        run: |
          echo NEXT_PUBLIC_API_URL=https://app.getcmmc.consulting >> .env
          echo NEXT_PUBLIC_FRAMEWORK_VERSION=$(sha1sum public/data/sp_800_171_3_0_0/framework.json | awk '{print $1}') >> .env

      - name: Build (pinned Node from flake)
        run: nix develop .#ci -c bash -c "cd client && npm ci && npm run build"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          cname: app.getcmmc.consulting
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/out

  # ---------------------------------------------------------------------------
  # Create the GitHub release once, up front, as a draft. The desktop jobs run
  # in parallel and each only *uploads* assets to this release; none of them
  # creates or finalizes it. That avoids the race where two jobs both try to
  # create/finalize the same tag and the second fails with
  # "Validation Failed: already_exists (tag_name)". publish-release flips the
  # draft to published once every desktop job has uploaded.
  # Idempotent: a re-run reuses the existing release for the tag.
  # ---------------------------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create or reuse draft release
        id: create
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          result-encoding: string
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const { owner, repo } = context.repo;
            const existing = await github.paginate(github.rest.repos.listReleases, { owner, repo });
            const found = existing.find(r => r.tag_name === tag);
            if (found) {
              core.info(`Reusing existing release ${found.id} for ${tag}`);
              return String(found.id);
            }
            const { data } = await github.rest.repos.createRelease({
              owner, repo, tag_name: tag, name: tag, draft: true, prerelease: false,
            });
            core.info(`Created draft release ${data.id} for ${tag}`);
            return String(data.id);

  # ---------------------------------------------------------------------------
  # Linux desktop bundles, built inside the pinned Nix shell so the toolchain
  # (rust, node, cargo-tauri, webkitgtk) is identical run-to-run. macOS lives in
  # its own job (desktop-macos) because signing/notarization needs the native
  # keychain + codesign tooling that the Nix shell doesn't provide.
  # ---------------------------------------------------------------------------
  desktop-nix:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # AppImage omitted for now: upstream linuxdeploy/FUSE breakage
          # (tauri-apps/tauri). Re-enable by adding `appimage` to bundleArgs below.
          - runner: ubuntu-24.04 # x86_64 linux: .deb / .rpm
            bundleArgs: "--bundles deb rpm"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Determinate Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache cargo (registry + target)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/src-tauri/target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('client/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-

      # The desktop app is offline-first: don't point it at the hosted API.
      - name: Create .env file
        working-directory: ./client
        run: |
          echo NEXT_PUBLIC_FRAMEWORK_VERSION=$(sha1sum public/data/sp_800_171_3_0_0/framework.json | awk '{print $1}') >> .env

      # App version = release tag with any leading "v" stripped, so bundle file
      # names and the footer track the tag instead of the hardcoded config.
      - name: Resolve version from tag
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build desktop bundle (inside pinned Nix shell)
        # Built in two phases so we can patch the binary between compile and
        # bundle. The Nix toolchain links the executable against the Nix glibc
        # loader (PT_INTERP -> /nix/store/...-glibc/ld-linux-x86-64.so.2) and
        # bakes /nix/store rpaths in; neither path exists on a Debian/RPM target,
        # so the bundled binary would fail to launch there. patchelf rewrites the
        # interpreter to the distro-standard path and drops the Nix rpaths. The
        # NEEDED sonames are untouched and resolve to the distro packages the
        # .deb/.rpm already depend on.
        #
        # --config overrides the bundle version; APP_VERSION (inherited into the
        # shell) feeds the footer via next.config. bundleArgs omits AppImage on
        # Linux for now (see the matrix comment).
        run: |
          nix develop .#ci -c bash -c '
            set -euo pipefail
            cd client
            npm ci
            cargo tauri build --no-bundle --config "{\"version\":\"$APP_VERSION\"}"
            patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 --remove-rpath src-tauri/target/release/cmmc
            cargo tauri bundle ${{ matrix.bundleArgs }} --config "{\"version\":\"$APP_VERSION\"}"
          '

      # Upload to the draft release created by create-release. Only uploads
      # assets — does not create or finalize the release — so it can't race the
      # macOS/Windows jobs uploading to the same release. --clobber makes re-runs
      # idempotent. nullglob keeps the glob from passing a literal path when a
      # bundle type is absent (e.g. AppImage, currently disabled).
      - name: Attach bundles to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          files=(
            client/src-tauri/target/release/bundle/deb/*.deb
            client/src-tauri/target/release/bundle/rpm/*.rpm
            # client/src-tauri/target/release/bundle/appimage/*.AppImage
          )
          gh release upload "${{ github.ref_name }}" "${files[@]}" --clobber

  # ---------------------------------------------------------------------------
  # Windows bundle. Nix can't produce native Windows binaries, so this stays on
  # a native runner with the standard Tauri toolchain via tauri-action.
  # ---------------------------------------------------------------------------
  desktop-windows:
    needs: create-release
    runs-on: windows-latest
    # Windows code signing via Azure Artifact Signing. Set these repo secrets to
    # enable it (all six required; otherwise the build runs unsigned):
    #   AZURE_ARTIFACT_SIGNING_ENDPOINT              e.g. https://eus.codesigning.azure.net/
    #   AZURE_ARTIFACT_SIGNING_ACCOUNT               signing account name
    #   AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE   certificate profile name
    #   AZURE_TENANT_ID / AZURE_CLIENT_ID / AZURE_CLIENT_SECRET   app registration
    # AZURE_ENDPOINT doubles as the "is signing configured?" switch: when the
    # endpoint secret is unset (forks, or before signing is set up) the build
    # still runs, just unsigned. The other values are passed to the bundle step
    # as env vars (read directly by the signing CLI); only the endpoint is needed
    # here, both to gate the setup step and to build signCommand.
    env:
      AZURE_ENDPOINT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
      # Non-empty => also produce Tauri updater artifacts (signed .sig files)
      # for auto-updates via Keygen. Empty (forks) => plain installers only.
      TAURI_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, pinned

      # Azure Artifact Signing (formerly Trusted Signing). Only runs when the
      # endpoint secret is present, so unsigned builds keep working. Tauri calls
      # artifact-signing-cli per bundled binary/installer via signCommand below.
      - name: Set up Azure Artifact Signing
        if: env.AZURE_ENDPOINT != ''
        shell: pwsh
        run: |
          # Pinned release of artifact-signing-cli (the renamed trusted-signing-cli
          # referenced by the Tauri docs). Ships a single prebuilt Windows binary.
          $url = "https://github.com/Levminer/trusted-signing-cli/releases/download/0.11.0/artifact-signing-cli.exe"
          $dir = Join-Path $env:USERPROFILE ".signing-bin"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Invoke-WebRequest -Uri $url -OutFile (Join-Path $dir "artifact-signing-cli.exe")
          Add-Content $env:GITHUB_PATH $dir

          # The CLI defaults SIGNTOOL_PATH to one pinned SDK build; point it at the
          # newest signtool actually installed on the runner instead. The default
          # Azure CLI path it expects already matches the runner image.
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          Add-Content $env:GITHUB_ENV "SIGNTOOL_PATH=$($signtool.FullName)"

      - name: Cache cargo (registry + target)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/src-tauri/target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('client/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: Create .env file
        working-directory: ./client
        shell: bash
        run: |
          echo NEXT_PUBLIC_FRAMEWORK_VERSION=$(sha1sum public/data/sp_800_171_3_0_0/framework.json | awk '{print $1}') >> .env

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      # App version = release tag (leading "v" stripped), shared by the bundle
      # name (--config below) and the footer (next.config reads APP_VERSION).
      # We write the override to a file rather than passing inline JSON: on
      # Windows the escaped quotes get destroyed as the args pass through
      # npm -> cmd.exe, so tauri receives a truncated string. A file path has
      # no special characters and survives the quoting intact.
      - name: Resolve version from tag
        shell: bash
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          # Compose the config override with jq: version always; the Azure
          # signCommand when signing is configured (%1 is the file path Tauri
          # substitutes); createUpdaterArtifacts when the updater signing key
          # is present (it fails the build without TAURI_SIGNING_PRIVATE_KEY,
          # so forks must not enable it).
          OVERRIDE="{\"version\":\"$APP_VERSION\"}"
          if [ -n "$AZURE_ENDPOINT" ]; then
            OVERRIDE=$(jq -c --arg cmd "artifact-signing-cli -e $AZURE_ENDPOINT -d CMMC %1" \
              '.bundle.windows.signCommand = $cmd' <<< "$OVERRIDE")
          fi
          if [ -n "$TAURI_SIGNING_KEY" ]; then
            OVERRIDE=$(jq -c '.bundle.createUpdaterArtifacts = true' <<< "$OVERRIDE")
          fi
          echo "$OVERRIDE" > client/version-override.json

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Read by artifact-signing-cli when signCommand runs (no-ops when the
          # signing secrets are unset). SIGNTOOL_PATH is exported in the setup
          # step above; AZURE_ENDPOINT is baked into signCommand.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE: ${{ secrets.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          # Signs the updater artifacts when createUpdaterArtifacts is on
          # (no-ops when the secrets are unset).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: client
          tauriScript: "npm tauri:win"
          # Config path is resolved relative to projectPath (client).
          args: "--config version-override.json"
          # Upload to the release create-release already made, rather than
          # creating/finalizing it here (which would race the other jobs).
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # Updates are served by Keygen's tauri engine, not a static manifest.
          includeUpdaterJson: false

  # ---------------------------------------------------------------------------
  # macOS bundles (.app/.dmg) for Apple Silicon + Intel, built on a native
  # runner via tauri-action so the Apple keychain / codesign / notarytool are
  # available. Signing + notarization run only when the Apple secrets are set,
  # so forks (and a first run before setup) still produce unsigned bundles.
  #
  # Required repo secrets to enable signing + notarization:
  #   APPLE_CERTIFICATE            base64 of the Developer ID Application .p12
  #   APPLE_CERTIFICATE_PASSWORD   password the .p12 was exported with
  #   KEYCHAIN_PASSWORD            any string; password for the temp keychain
  #   APPLE_API_KEY_P8             base64 of the App Store Connect API key .p8
  #   APPLE_API_KEY_ID             the key's Key ID (10 chars)
  #   APPLE_API_ISSUER_ID          the App Store Connect API Issuer ID (UUID)
  # NOTE: the cert must be a "Developer ID Application" certificate. An "Apple
  # Development" cert can't be notarized and Gatekeeper will block the .dmg.
  # The .p8 is signing-independent: the certificate signs, the API key notarizes.
  # ---------------------------------------------------------------------------
  desktop-macos:
    needs: create-release
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin # Apple Silicon
          - target: x86_64-apple-darwin # Intel
    # Presence of these secrets gates the cert import / API key steps below.
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      # Non-empty => also produce Tauri updater artifacts (.app.tar.gz + .sig)
      # for auto-updates via Keygen. Empty (forks) => plain bundles only.
      TAURI_SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, pinned
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo (registry + target)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('client/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.target }}-

      # The desktop app is offline-first: don't point it at the hosted API.
      - name: Create .env file
        working-directory: ./client
        run: |
          echo NEXT_PUBLIC_FRAMEWORK_VERSION=$(sha1sum public/data/sp_800_171_3_0_0/framework.json | awk '{print $1}') >> .env

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      # App version = release tag (leading "v" stripped), shared by the bundle
      # name (--config below) and the footer (next.config reads APP_VERSION).
      - name: Resolve version from tag
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          # createUpdaterArtifacts only when the updater signing key is present
          # (it fails the build without TAURI_SIGNING_PRIVATE_KEY, so forks
          # must not enable it).
          if [ -n "$TAURI_SIGNING_KEY" ]; then
            echo "{\"version\":\"$APP_VERSION\",\"bundle\":{\"createUpdaterArtifacts\":true}}" > client/version-override.json
          else
            echo "{\"version\":\"$APP_VERSION\"}" > client/version-override.json
          fi

      # Import the Developer ID Application cert into a throwaway keychain and
      # publish the signing identity for tauri-action to pick up.
      - name: Import Apple Developer certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          rm certificate.p12

      # Decode the App Store Connect API key (.p8) to a file for notarization.
      # APPLE_API_KEY_PATH must be absolute; $RUNNER_TEMP is cleaned up per job.
      - name: Prepare App Store Connect API key
        if: env.APPLE_API_KEY_P8 != ''
        run: |
          echo "$APPLE_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # tauri only signs when APPLE_SIGNING_IDENTITY is set (empty -> unsigned),
          # and only notarizes when the API key trio is present. APPLE_API_KEY is
          # the Key ID; APPLE_API_KEY_PATH points at the decoded .p8 above.
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          # Signs the updater artifacts when createUpdaterArtifacts is on
          # (no-ops when the secrets are unset).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: client
          tauriScript: "npm tauri:mac"
          # Config path is resolved relative to projectPath (client).
          args: "--target ${{ matrix.target }} --config version-override.json"
          # Upload to the release create-release already made, rather than
          # creating/finalizing it here (which would race the other jobs).
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # Updates are served by Keygen's tauri engine, not a static manifest.
          includeUpdaterJson: false

  # ---------------------------------------------------------------------------
  # Mirror the release into Keygen so the app's auto-updater (Keygen's tauri
  # engine) can serve it: create a Keygen release for the tag, upload the
  # updater artifacts (.app.tar.gz / -setup.exe with their .sig signatures,
  # plus unsigned .deb/.rpm as version beacons for the Linux notify-only
  # path), and publish. IMPORTANT: the engine looks up the CLIENT'S CURRENT
  # version as a Keygen release — a shipped tag missing here silently stops
  # that cohort's update checks (see docs/licensing.md for the backfill
  # recipe). publish-release depends on this job so the GitHub release only
  # goes public once Keygen can serve it. No-ops when KEYGEN_TOKEN is unset
  # (forks, or before Keygen distribution is configured).
  # ---------------------------------------------------------------------------
  keygen-upload:
    needs: [create-release, desktop-nix, desktop-windows, desktop-macos]
    runs-on: ubuntu-latest
    env:
      KEYGEN_ACCOUNT_ID: 09191a95-7ae5-4152-ba46-6a8ce47a505d
      KEYGEN_PRODUCT_ID: ${{ vars.KEYGEN_PRODUCT_ID }}
      KEYGEN_TOKEN: ${{ secrets.KEYGEN_TOKEN }} # product token; empty => job no-ops
      KEYGEN_PACKAGE: cmmc
    steps:
      - name: Install keygen CLI
        if: env.KEYGEN_TOKEN != ''
        run: curl -sSL https://raw.pkg.keygen.sh/keygen/cli/latest/install.sh | sh

      # The release is still a draft; gh can download draft assets with the
      # job token. Patterns tolerate absence (e.g. unsigned fork builds).
      - name: Download release assets
        if: env.KEYGEN_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir assets
          for pattern in '*.app.tar.gz' '*.app.tar.gz.sig' '*-setup.exe' '*-setup.exe.sig' '*.deb' '*.rpm'; do
            gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --dir assets --pattern "$pattern" || true
          done
          ls -la assets

      - name: Create, upload and publish Keygen release
        if: env.KEYGEN_TOKEN != ''
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          # Tolerate an existing release so re-runs don't fail outright.
          keygen new --version "$VERSION" --channel stable --package "$KEYGEN_PACKAGE" \
            --name "CMMC $VERSION" || echo "release $VERSION may already exist; continuing"

          shopt -s nullglob
          # macOS updater bundles, per arch. tauri-action names them with the
          # target arch (aarch64 / x64 or x86_64).
          for f in assets/*aarch64*.app.tar.gz; do
            keygen upload "$f" --release "$VERSION" --package "$KEYGEN_PACKAGE" \
              --platform darwin --arch aarch64 --filetype app.tar.gz --signature "$(cat "$f.sig")"
          done
          for f in assets/*x64*.app.tar.gz assets/*x86_64*.app.tar.gz; do
            keygen upload "$f" --release "$VERSION" --package "$KEYGEN_PACKAGE" \
              --platform darwin --arch x86_64 --filetype app.tar.gz --signature "$(cat "$f.sig")"
          done
          # Windows NSIS installer (the engine prefers .exe over .msi).
          for f in assets/*-setup.exe; do
            keygen upload "$f" --release "$VERSION" --package "$KEYGEN_PACKAGE" \
              --platform windows --arch x86_64 --signature "$(cat "$f.sig")"
          done
          # Linux version beacons for the notify-only path — served but never
          # installed by the updater, so no updater signature exists for them.
          for f in assets/*.deb assets/*.rpm; do
            keygen upload "$f" --release "$VERSION" --package "$KEYGEN_PACKAGE" \
              --platform linux --arch x86_64
          done

          keygen publish --release "$VERSION" --package "$KEYGEN_PACKAGE"

  # ---------------------------------------------------------------------------
  # Publish the draft release once every desktop job has finished uploading its
  # assets. A single job owns finalization, so there's no concurrent "finalize"
  # to race. Idempotent: setting draft:false on an already-published release is a
  # no-op update. Also gated on keygen-upload so the GitHub release never goes
  # public for a version the auto-updater can't serve.
  # ---------------------------------------------------------------------------
  publish-release:
    needs:
      [
        create-release,
        desktop-nix,
        desktop-windows,
        desktop-macos,
        keygen-upload,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.updateRelease({
              owner, repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });

  # ---------------------------------------------------------------------------
  # After the release is published, ping the marketing site
  # (nealfennimore/cmmc-consulting-site) so it bumps its pinned download links to
  # this tag and redeploys. Needs a PAT with Contents:write on the site repo,
  # stored here as the SITE_DISPATCH_TOKEN secret.
  # ---------------------------------------------------------------------------
  notify-site:
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger getcmmc.consulting redeploy
        env:
          TOKEN: ${{ secrets.SITE_DISPATCH_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          curl -sSf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/nealfennimore/cmmc-consulting-site/dispatches \
            -d "{\"event_type\":\"app-release\",\"client_payload\":{\"version\":\"$VERSION\"}}"
